<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập 34 - Nguyễn Hữu Trí</title>
    <style>
        :root {
            --primary: #ff007f; /* Pink Neon */
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 0, 127, 0.2);
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .info { font-size: 1.1em; margin-bottom: 30px; opacity: 0.8; }
        
        .screenshot-wrapper {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            border: 2px solid var(--primary);
        }
        .screenshot-wrapper img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .footer-nav { margin-top: 30px; }
        .back-btn {
            text-decoration: none;
            color: white;
            background: var(--primary);
            padding: 10px 25px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }
        .back-btn:hover {
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.05);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KẾT QUẢ BÀI TẬP 34</h1>
        <div class="info">
            <p>Sinh viên: <strong>Nguyễn Hữu Trí (ATRI)</strong></p>
            <p>Mã số sinh viên: <strong>231A011138</strong></p>
        </div>

        <div class="screenshot-wrapper">
            <img src="images/baitap34.jpg" alt="Ảnh chụp màn hình bài tập 34">
        </div>

        <div class="footer-nav">
            <p>Bài tập này đã được tích hợp vào hệ thống Movie Discovery App.</p>
            <a href="index.html" class="back-btn">← Quay lại Trang chủ</a>
        </div>
    </div>

</body>
</html>
